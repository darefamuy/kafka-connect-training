# =============================================================================
# HCI Pharma — Kafka Connect Demo
# Local services: PostgreSQL (source DB) + Elasticsearch + Kibana
# Remote:         Confluent Cloud Kafka cluster (configured via .env)
#
# Architecture:
#   PostgreSQL ──► Kafka Connect (JDBC Source) ──► Confluent Cloud
#                                                          │
#                                              (Kafka Streams processes)
#                                                          │
#   Elasticsearch ◄── Kafka Connect (ES Sink) ────────────┘
#
# Start everything:   docker compose up -d
# Watch logs:         docker compose logs -f connect
# Tear down:          docker compose down -v
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Source database
  # Contains the three HCI pharmaceutical tables that will be CDC'd into Kafka.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: hci-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       hci_pharma
      POSTGRES_USER:     hci_user
      POSTGRES_PASSWORD: hci_secret
    ports:
      - "5432:5432"
    volumes:
      # Initialisation scripts run in filename order on first start
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/02_seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hci_user -d hci_pharma"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Elasticsearch — Sink for processed Kafka topic output
  # Single-node development cluster (not suitable for production).
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.0
    container_name: elasticsearch
    environment:
      - node.name=es01
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.0
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60

  # ---------------------------------------------------------------------------
  # Kafka Connect — Distributed mode worker
  #
  # Connects OUTBOUND to Confluent Cloud (source connectors push data up).
  # Connects OUTBOUND to Elasticsearch (sink connectors pull data down from CC).
  #
  # Plugin JARs are downloaded at build time via the Dockerfile.
  # Confluent Cloud credentials are injected from the .env file.
  # ---------------------------------------------------------------------------
  connect:
    build:
      context: .
      dockerfile: Dockerfile.connect
    container_name: hci-connect
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      # ── Worker identity ────────────────────────────────────────────────────
      CONNECT_GROUP_ID:                             hci-connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC:                 _hci-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC:                 _hci-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC:                 _hci-connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR:    "3"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR:    "3"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR:    "3"

      # ── Confluent Cloud broker ─────────────────────────────────────────────
      CONNECT_BOOTSTRAP_SERVERS:                    ${CONFLUENT_BOOTSTRAP_SERVERS}
      CONNECT_SECURITY_PROTOCOL:                    SASL_SSL
      CONNECT_SASL_MECHANISM:                       PLAIN
      CONNECT_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${CONFLUENT_API_KEY}"
        password="${CONFLUENT_API_SECRET}";

      # ── Producer config (used by source connectors) ────────────────────────
      CONNECT_PRODUCER_BOOTSTRAP_SERVERS:           ${CONFLUENT_BOOTSTRAP_SERVERS}
      CONNECT_PRODUCER_SECURITY_PROTOCOL:           SASL_SSL
      CONNECT_PRODUCER_SASL_MECHANISM:              PLAIN
      CONNECT_PRODUCER_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${CONFLUENT_API_KEY}"
        password="${CONFLUENT_API_SECRET}";
      CONNECT_PRODUCER_COMPRESSION_TYPE:            snappy

      # ── Consumer config (used by sink connectors) ──────────────────────────
      CONNECT_CONSUMER_BOOTSTRAP_SERVERS:           ${CONFLUENT_BOOTSTRAP_SERVERS}
      CONNECT_CONSUMER_SECURITY_PROTOCOL:           SASL_SSL
      CONNECT_CONSUMER_SASL_MECHANISM:              PLAIN
      CONNECT_CONSUMER_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${CONFLUENT_API_KEY}"
        password="${CONFLUENT_API_SECRET}";

      # ── Schema Registry ────────────────────────────────────────────────────
      CONNECT_KEY_CONVERTER:                        org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER:                      io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL:  ${CONFLUENT_SCHEMA_REGISTRY_URL}
      CONNECT_VALUE_CONVERTER_BASIC_AUTH_CREDENTIALS_SOURCE: USER_INFO
      CONNECT_VALUE_CONVERTER_BASIC_AUTH_USER_INFO: ${CONFLUENT_SR_API_KEY}:${CONFLUENT_SR_API_SECRET}

      # ── Config Provider ────────────────────────────────────────────────────
      # Allows using ${env:VARIABLE_NAME} inside connector JSON configs
      CONNECT_CONFIG_PROVIDERS:                      env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS:            org.apache.kafka.common.config.provider.EnvVarConfigProvider

      # ── Explicit env vars for connector config resolution ──────────────────
      CONFLUENT_SCHEMA_REGISTRY_URL:                ${CONFLUENT_SCHEMA_REGISTRY_URL}
      CONFLUENT_SR_API_KEY:                         ${CONFLUENT_SR_API_KEY}
      CONFLUENT_SR_API_SECRET:                      ${CONFLUENT_SR_API_SECRET}

      # ── REST API ───────────────────────────────────────────────────────────
      CONNECT_REST_PORT:                            8083
      CONNECT_REST_ADVERTISED_HOST_NAME:            connect

      # ── Plugin path ────────────────────────────────────────────────────────
      CONNECT_PLUGIN_PATH:                          /usr/share/confluent-hub-components

      # ── Logging ────────────────────────────────────────────────────────────
      CONNECT_LOG4J_ROOT_LOGLEVEL:                  INFO
      CONNECT_LOG4J_LOGGERS: >-
        org.apache.kafka.connect.runtime.rest=WARN,
        org.reflections=ERROR

    ports:
      - "8083:8083"

  # ---------------------------------------------------------------------------
  # Connect Provisioner — one-shot container that registers all connectors
  # via the Connect REST API after the worker has fully started.
  # ---------------------------------------------------------------------------
  provisioner:
    image: curlimages/curl:8.7.1
    container_name: hci-provisioner
    depends_on:
      - connect
    restart: "no"
    volumes:
      - ./scripts/provision-connectors.sh:/provision-connectors.sh:ro
      - ./connectors:/connectors:ro
    entrypoint: ["sh", "/provision-connectors.sh"]
    environment:
      CONNECT_URL: http://connect:8083

# =============================================================================
volumes:
  postgres_data:
  esdata:

